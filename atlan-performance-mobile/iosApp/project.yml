# XcodeGen spec for the Atlan Performance iOS app.
#
# This file is the source of truth for the Xcode project; the .xcodeproj itself is generated
# (and safe to delete/regenerate) via:  cd iosApp && xcodegen generate
#
# It links the KMP `Shared` framework produced by the shared module. A pre-build script runs the
# Gradle `embedAndSignAppleFrameworkForXcode` task so the framework is rebuilt for the active
# configuration/SDK before each Xcode build — no manual framework wiring needed.
name: AtlanPerformance
options:
  bundleIdPrefix: com.atlan.performance
  deploymentTarget:
    iOS: "16.0"          # NavigationStack / presentationDetents require iOS 16+
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    # Allow the Gradle pre-build script to read/write the shared framework outputs.
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # Find and link the framework that embedAndSignAppleFrameworkForXcode drops here.
    FRAMEWORK_SEARCH_PATHS:
      - $(inherited)
      - $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
    OTHER_LDFLAGS:
      - $(inherited)
      - -framework
      - Shared
      # SQLDelight's native driver (touchlab/sqliter) calls system SQLite; the static Shared
      # framework leaves these symbols undefined, so the app must link libsqlite3.
      - -lsqlite3

targets:
  AtlanPerformance:
    type: application
    platform: iOS
    sources:
      - path: AtlanPerformance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atlan.performance.ios
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Atlan Performance
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        # Simulator builds: Kotlin/Native produces arm64 (Apple Silicon) sim slices.
        ONLY_ACTIVE_ARCH: YES
    preBuildScripts:
      - name: "Build Kotlin Shared framework"
        basedOnDependencyAnalysis: false
        script: |
          # Xcode's build env has a minimal PATH and no JAVA_HOME; point Gradle at the
          # Homebrew JDK 17 installed for this project.
          if [ -d "/opt/homebrew/opt/openjdk@17" ]; then
            export JAVA_HOME="/opt/homebrew/opt/openjdk@17"
          fi
          export PATH="$JAVA_HOME/bin:$PATH"
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
